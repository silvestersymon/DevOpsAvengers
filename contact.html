<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - DevOps Avengers Travels</title>
    <style>
        /* Modern Design-gaga inline CSS sethuruken, Anand CSS eluthumbothu ithai mathிக்கலாம் */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #0288d1;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1rem;
        }

        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 40px;
        }

        /* Office Details Section */
        .contact-info {
            background: #0288d1;
            color: #fff;
            padding: 40px;
            border-radius: 8px;
        }

        .contact-info h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .info-box {
            margin-bottom: 25px;
        }

        .info-box h4 {
            font-size: 1.1rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #b3e5fc;
        }

        /* Form Section */
        .contact-form h3 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: #0288d1;
            outline: none;
        }

        .submit-btn {
            background: #0288d1;
            color: #fff;
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s ease;
        }

        .submit-btn:hover {
            background: #01579b;
        }

        /* Mobile View Response */
        @media (max-width: 768px) {
            .contact-wrapper {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Contact Us</h1>
            <p>We are happy to help you. Plan your dream vacation with us!</p>
        </div>

        <div class="contact-wrapper">
            <!-- Left Side: Office Info -->
            <div class="contact-info">
                <h3>Get in Touch</h3>
                
                <div class="info-box">
                    <h4>Our Office Address</h4>
                    <p>123 Travel Towers, DevOps Street,<br>Chennai, Tamil Nadu, India</p>
                </div>

                <div class="info-box">
                    <h4>Call Us</h4>
                    <p>+91 98765 43210</p>
                    <p>+91 044 123456</p>
                </div>

                <div class="info-box">
                    <h4>Email Support</h4>
                    <p>info@devopsavengers.com</p>
                    <p>bookings@devopsavengers.com</p>
                </div>
            </div>

            <!-- Right Side: Contact Form -->
            <div class="contact-form">
                <h3>Send Us a Message</h3>
                <form action="#">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" placeholder="Enter your phone number">
                    </div>

                    <div class="form-group">
                        <label for="message">Your Message / Travel Requirements</label>
                        <textarea id="message" rows="5" placeholder="Tell us where you want to go..." required></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
